services:
  - type: web
    name: clickup-dashboard
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 1 -k uvicorn.workers.UvicornWorker main:app --bind 0.0.0.0:$PORT
    healthCheckPath: /
    envVars:
      - key: CLICKUP_TOKEN
        sync: false
      - key: CLICKUP_USER_ID
        sync: false
      - key: CLICKUP_TEAM_ID
        sync: false
      - key: CLICKUP_WEBHOOK_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
